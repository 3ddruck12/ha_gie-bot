blueprint:
  name: GießBot 4000 – Tomaten Gewächshaus
  description: >
    Bewässerung für Tomaten im Gewächshaus: täglich morgens und abends zu festen Zeiten,
    je 20 Minuten pro Lauf (anpassbar). Optional Feuchte-Prüfung, Hitze-/Sommer-Faktoren
    und Push-Benachrichtigungen.
  domain: automation
  author: 3ddruck12
  source_url: https://github.com/3ddruck12/ha_gie-bot/blob/main/blueprintgiessbot4000.yaml

  input:
    zone_name:
      name: Zonenname
      selector:
        text: {}
      default: Gewächshaus Tomaten

    enable_switch:
      name: Aktivierungsschalter
      selector:
        entity:
          domain: input_boolean

    watering_targets:
      name: Ventile / Pumpen
      selector:
        target:
          entity:
            domain: switch

    soil_moisture_sensor:
      name: Bodenfeuchtesensor
      description: >
        Sensor mit Bodenfeuchte in Prozent (%). Auch Sensoren ohne device_class
        „moisture“ werden angezeigt (z. B. Zigbee, ESP, Custom-Sensoren).
      selector:
        entity:
          domain: sensor

    temperature_sensor:
      name: Temperatursensor
      description: Temperatur-Sensor in °C (optional für Hitze-Anpassung).
      selector:
        entity:
          domain: sensor

    morning_time:
      name: Morgens (Tomaten)
      description: Empfohlen für Tomaten im Gewächshaus 05:00 Uhr.
      default: "05:00:00"
      selector:
        time: {}

    evening_time:
      name: Abends (Tomaten)
      description: Empfohlen für Tomaten im Gewächshaus 20:30 Uhr.
      default: "20:30:00"
      selector:
        time: {}

    morning_duration:
      name: Gießdauer morgens (Minuten)
      default: 20
      selector:
        number:
          min: 1
          max: 60
          unit_of_measurement: min

    evening_duration:
      name: Gießdauer abends (Minuten)
      default: 20
      selector:
        number:
          min: 1
          max: 60
          unit_of_measurement: min

    water_only_if_dry:
      name: Nur gießen wenn zu trocken
      description: >
        Wenn aktiv, wird nur bei Feuchte unter der Schwelle gegossen.
        Wenn aus, gießt der Bot zu jeder festen Zeit die volle Dauer.
      default: true
      selector:
        boolean: {}

    moisture_threshold:
      name: Feuchte-Schwelle (%)
      default: 45
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"

    sensor_fallback:
      name: Sensor-Fallback aktivieren
      description: Bei unbekanntem Feuchtesensor trotzdem gießen.
      default: true
      selector:
        boolean: {}

    duration_adjustment_enabled:
      name: Dauer bei Hitze/Sommer verlängern
      description: >
        Wenn aus, bleiben morgens/abends exakt die eingestellten Minuten (Standard für Tomaten).
        Wenn an, verlängert sich die Dauer bei hoher Temperatur und im Sommer.
      default: false
      selector:
        boolean: {}

    temp_threshold:
      name: Temperatur-Schwelle (°C)
      default: 28
      selector:
        number:
          min: 0
          max: 50
          unit_of_measurement: °C

    temp_multiplier:
      name: Faktor bei Hitze
      default: 1.3
      selector:
        number:
          min: 1.0
          max: 2.0
          step: 0.1

    summer_multiplier:
      name: Sommer-Faktor (Mai–Aug)
      default: 1.2
      selector:
        number:
          min: 1.0
          max: 2.0
          step: 0.1

    notify_enabled:
      name: Benachrichtigungen aktivieren
      default: false
      selector:
        boolean: {}

    notify_service:
      name: Benachrichtigungsdienst
      description: z. B. notify.mobile_app_mein_handy
      selector:
        entity:
          domain: notify

trigger:
  - platform: time
    at: !input morning_time
    id: morning
  - platform: time
    at: !input evening_time
    id: evening

condition:
  - condition: state
    entity_id: !input enable_switch
    state: "on"

action:
  - variables:
      zone: !input zone_name
      moisture_entity: !input soil_moisture_sensor
      temp_entity: !input temperature_sensor
      watering_target_data: !input watering_targets
      notify_enabled: !input notify_enabled
      notify_entity: !input notify_service

      run_label: "{{ 'Morgens' if trigger.id == 'morning' else 'Abends' }}"
      scheduled_minutes: "{{ morning_duration if trigger.id == 'morning' else evening_duration }}"
      morning_duration: !input morning_duration
      evening_duration: !input evening_duration

      soil_moisture: "{{ states(moisture_entity) | float(0) }}"
      temp: "{{ states(temp_entity) | float(0) }}"
      threshold: !input moisture_threshold
      fallback: !input sensor_fallback
      check_moisture: !input water_only_if_dry
      adjust_duration: !input duration_adjustment_enabled

      temp_limit: !input temp_threshold
      temp_factor: !input temp_multiplier
      summer_factor: !input summer_multiplier

      temp_adjust: "{{ temp_factor if (adjust_duration and temp > temp_limit) else 1 }}"
      season_adjust: "{{ summer_factor if (adjust_duration and now().month in [5, 6, 7, 8]) else 1 }}"
      final_duration: "{{ (scheduled_minutes | float(20) * temp_adjust * season_adjust) | round(0) }}"
      duration_seconds: "{{ (final_duration | int) * 60 }}"

      start_message: "{{ run_label ~ ': Gießen gestartet (' ~ (final_duration | int | string) ~ ' Min). Feuchte ' ~ (soil_moisture | string) ~ '%, Temp ' ~ (temp | string) ~ '°C.' }}"
      end_message: "{{ run_label ~ ': Gießen beendet nach ' ~ (final_duration | int | string) ~ ' Min. Feuchte jetzt ' ~ states(moisture_entity) ~ '%.' }}"
      skip_message: "{{ run_label ~ ': Kein Gießen nötig. Feuchte ' ~ (soil_moisture | string) ~ '% (Schwelle ' ~ (threshold | string) ~ '%).' }}"

  - choose:
      - conditions:
          - condition: template
            value_template: >
              {% if not check_moisture %}
              true
              {% else %}
              {% set valid = states(moisture_entity) not in ['unknown', 'unavailable', 'none', ''] %}
              {{ (valid and soil_moisture < threshold) or (not valid and fallback) }}
              {% endif %}
        sequence:
          - service: switch.turn_on
            target: "{{ watering_target_data }}"

          - if:
              - condition: template
                value_template: "{{ notify_enabled and notify_entity not in ['', 'unknown', 'unavailable', 'none'] }}"
            then:
              - service: notify.notify
                continue_on_error: true
                target:
                  entity_id: "{{ notify_entity }}"
                data:
                  title: "GießBot – {{ zone }}"
                  message: "{{ start_message }}"

          - delay:
              seconds: "{{ duration_seconds }}"

          - service: switch.turn_off
            target: "{{ watering_target_data }}"

          - if:
              - condition: template
                value_template: "{{ notify_enabled and notify_entity not in ['', 'unknown', 'unavailable', 'none'] }}"
            then:
              - service: notify.notify
                continue_on_error: true
                target:
                  entity_id: "{{ notify_entity }}"
                data:
                  title: "GießBot – {{ zone }}"
                  message: "{{ end_message }}"

    default:
      - if:
          - condition: template
            value_template: "{{ notify_enabled and notify_entity not in ['', 'unknown', 'unavailable', 'none'] }}"
        then:
          - service: notify.notify
            continue_on_error: true
            target:
              entity_id: "{{ notify_entity }}"
            data:
              title: "GießBot – {{ zone }}"
              message: "{{ skip_message }}"

mode: single
