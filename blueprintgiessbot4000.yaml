blueprint:
  name: GießBot 4000 – Tomaten Gewächshaus
  description: >
    Bewässerung für Tomaten im Gewächshaus: täglich morgens und abends zu festen Zeiten,
    je 20 Minuten pro Lauf (anpassbar). Benachrichtigungen in Home Assistant,
    optional Push ans Handy. Sensor-Fallback maximal 1× pro Tag.
  domain: automation
  author: 3ddruck12
  source_url: https://github.com/3ddruck12/ha_gie-bot/blob/main/blueprintgiessbot4000.yaml

  input:
    zone_name:
      name: Zonenname
      selector:
        text: {}
      default: Gewächshaus Tomaten

    enable_switch:
      name: Aktivierungsschalter
      selector:
        entity:
          filter:
            - domain: input_boolean
          multiple: false

    watering_targets:
      name: Ventile / Pumpen
      selector:
        target:
          entity:
            - domain:
                - switch

    soil_moisture_sensor:
      name: Bodenfeuchtesensor
      description: Der Sensor, der die aktuelle Bodenfeuchtigkeit für diese Zone misst (in %).
      selector:
        entity:
          filter:
            - domain: sensor
            - domain: number
          multiple: false

    temperature_sensor:
      name: Temperatursensor
      description: Temperatursensor in °C (optional für Hitze-Anpassung).
      selector:
        entity:
          filter:
            - domain: sensor
          multiple: false

    morning_time:
      name: Morgens (Tomaten)
      description: Empfohlen für Tomaten im Gewächshaus 05:00 Uhr.
      default: "05:00:00"
      selector:
        time: {}

    evening_time:
      name: Abends (Tomaten)
      description: Empfohlen für Tomaten im Gewächshaus 20:30 Uhr.
      default: "20:30:00"
      selector:
        time: {}

    morning_duration:
      name: Gießdauer morgens (Minuten)
      default: 20
      selector:
        number:
          min: 1
          max: 60
          unit_of_measurement: min

    evening_duration:
      name: Gießdauer abends (Minuten)
      default: 20
      selector:
        number:
          min: 1
          max: 60
          unit_of_measurement: min

    water_only_if_dry:
      name: Nur gießen wenn zu trocken
      description: >
        Wenn aktiv, wird nur bei Feuchte unter der Schwelle gegossen.
        Wenn aus, gießt der Bot zu jeder festen Zeit die volle Dauer.
      default: true
      selector:
        boolean: {}

    moisture_threshold:
      name: Feuchte-Schwelle (%)
      default: 45
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"

    sensor_fallback:
      name: Sensor-Fallback aktivieren
      description: >
        Wenn der Feuchtesensor ausfällt, darf der Bot höchstens 1× pro Tag
        zu einer festen Zeit gießen (Tracker-Helfer erforderlich).
      default: false
      selector:
        boolean: {}

    fallback_tracker:
      name: Fallback-Tracker (input_datetime)
      description: >
        Helfer anlegen unter Einstellungen → Helfer → Datum und Uhrzeit
        (z. B. input_datetime.giessbot_fallback). Merkt sich den letzten Fallback-Lauf.
      selector:
        entity:
          filter:
            - domain: input_datetime
          multiple: false

    duration_adjustment_enabled:
      name: Dauer bei Hitze/Sommer verlängern
      description: >
        Wenn aus, bleiben morgens/abends exakt die eingestellten Minuten (Standard für Tomaten).
        Wenn an, verlängert sich die Dauer bei hoher Temperatur und im Sommer.
      default: false
      selector:
        boolean: {}

    temp_threshold:
      name: Temperatur-Schwelle (°C)
      default: 28
      selector:
        number:
          min: 0
          max: 50
          unit_of_measurement: °C

    temp_multiplier:
      name: Faktor bei Hitze
      default: 1.3
      selector:
        number:
          min: 1.0
          max: 2.0
          step: 0.1

    summer_multiplier:
      name: Sommer-Faktor (Mai–Aug)
      default: 1.2
      selector:
        number:
          min: 1.0
          max: 2.0
          step: 0.1

    notify_ha_enabled:
      name: Benachrichtigungen in Home Assistant
      description: Zeigt Meldungen in der HA-Sidebar (Glocke links).
      default: true
      selector:
        boolean: {}

    notify_mobile_enabled:
      name: Push ans Handy
      default: false
      selector:
        boolean: {}

    notify_service:
      name: Benachrichtigungsdienst (Handy)
      description: z. B. notify.mobile_app_mein_handy
      selector:
        entity:
          filter:
            - domain: notify
          multiple: false

trigger:
  - platform: time
    at: !input morning_time
    id: morning
  - platform: time
    at: !input evening_time
    id: evening

condition:
  - condition: state
    entity_id: !input enable_switch
    state: "on"

action:
  - variables:
      zone: !input zone_name
      moisture_entity: !input soil_moisture_sensor
      temp_entity: !input temperature_sensor
      watering_target_data: !input watering_targets
      fallback_tracker_entity: !input fallback_tracker
      notify_ha_enabled: !input notify_ha_enabled
      notify_mobile_enabled: !input notify_mobile_enabled
      notify_entity: !input notify_service

      run_label: "{{ 'Morgens' if trigger.id == 'morning' else 'Abends' }}"
      morning_duration: !input morning_duration
      evening_duration: !input evening_duration
      scheduled_minutes: "{{ morning_duration if trigger.id == 'morning' else evening_duration }}"

      soil_moisture: "{{ states(moisture_entity) | float(0) }}"
      temp: "{{ states(temp_entity) | float(0) }}"
      threshold: !input moisture_threshold
      fallback: !input sensor_fallback
      check_moisture: !input water_only_if_dry
      adjust_duration: !input duration_adjustment_enabled

      temp_limit: !input temp_threshold
      temp_factor: !input temp_multiplier
      summer_factor: !input summer_multiplier

      temp_adjust: "{{ temp_factor if (adjust_duration and temp > temp_limit) else 1 }}"
      season_adjust: "{{ summer_factor if (adjust_duration and now().month in [5, 6, 7, 8]) else 1 }}"
      final_duration: "{{ (scheduled_minutes | float(20) * temp_adjust * season_adjust) | round(0) | int }}"

      notification_id_base: "giessbot_{{ zone | slugify }}"

      start_message: "{{ run_label ~ ': Gießen gestartet (' ~ (final_duration | int | string) ~ ' Min). Feuchte ' ~ states(moisture_entity) ~ '%, Temp ' ~ (temp | string) ~ '°C.' }}"
      start_fallback_message: "{{ run_label ~ ': Fallback-Gießen gestartet (' ~ (final_duration | int | string) ~ ' Min). Feuchtesensor ausgefallen.' }}"
      end_message: "{{ run_label ~ ': Gießen beendet nach ' ~ (final_duration | int | string) ~ ' Min. Feuchte jetzt ' ~ states(moisture_entity) ~ '%.' }}"
      skip_message: "{{ run_label ~ ': Kein Gießen nötig. Feuchte ' ~ (soil_moisture | string) ~ '% (Schwelle ' ~ (threshold | string) ~ '%).' }}"
      skip_fallback_used_message: "{{ run_label ~ ': Sensor ausgefallen. Fallback heute bereits genutzt — kein Gießen.' }}"
      skip_no_fallback_message: "{{ run_label ~ ': Sensor ausgefallen. Fallback deaktiviert — kein Gießen.' }}"
      skip_no_tracker_message: "{{ run_label ~ ': Sensor ausgefallen. Fallback-Tracker fehlt — kein Gießen.' }}"

  - choose:
      - conditions:
          - condition: template
            value_template: >
              {% if not check_moisture %}
              true
              {% else %}
              {% set valid = states(moisture_entity) not in ['unknown', 'unavailable', 'none', ''] %}
              {% if valid and soil_moisture < threshold %}
              true
              {% elif not valid and fallback and fallback_tracker_entity not in ['', 'unknown', 'unavailable', 'none'] %}
              {% set tracker = states(fallback_tracker_entity) %}
              {% set today = now().strftime('%Y-%m-%d') %}
              {% set last = tracker[:10] if tracker not in ['unknown', 'unavailable', 'none', ''] else '' %}
              {{ last != today }}
              {% else %}
              false
              {% endif %}
              {% endif %}
        sequence:
          - service: switch.turn_off
            target: !input watering_targets

          - service: switch.turn_on
            target: !input watering_targets

          - choose:
              - conditions:
                  - condition: template
                    value_template: >
                      {% set valid = states(moisture_entity) not in ['unknown', 'unavailable', 'none', ''] %}
                      {{ check_moisture and fallback and not valid }}
                sequence:
                  - if:
                      - condition: template
                        value_template: "{{ notify_ha_enabled }}"
                    then:
                      - service: persistent_notification.create
                        data:
                          title: "GießBot – {{ zone }}"
                          message: "{{ start_fallback_message }}"
                          notification_id: "{{ notification_id_base }}_start"
                  - if:
                      - condition: template
                        value_template: "{{ notify_mobile_enabled and notify_entity not in ['', 'unknown', 'unavailable', 'none'] }}"
                    then:
                      - service: notify.notify
                        continue_on_error: true
                        target:
                          entity_id: "{{ notify_entity }}"
                        data:
                          title: "GießBot – {{ zone }}"
                          message: "{{ start_fallback_message }}"
            default:
              - if:
                  - condition: template
                    value_template: "{{ notify_ha_enabled }}"
                then:
                  - service: persistent_notification.create
                    data:
                      title: "GießBot – {{ zone }}"
                      message: "{{ start_message }}"
                      notification_id: "{{ notification_id_base }}_start"
              - if:
                  - condition: template
                    value_template: "{{ notify_mobile_enabled and notify_entity not in ['', 'unknown', 'unavailable', 'none'] }}"
                then:
                  - service: notify.notify
                    continue_on_error: true
                    target:
                      entity_id: "{{ notify_entity }}"
                    data:
                      title: "GießBot – {{ zone }}"
                      message: "{{ start_message }}"

          - delay:
              minutes: "{{ final_duration }}"

          - service: switch.turn_off
            target: !input watering_targets

          - if:
              - condition: template
                value_template: >
                  {% set valid = states(moisture_entity) not in ['unknown', 'unavailable', 'none', ''] %}
                  {{ check_moisture and fallback and not valid and fallback_tracker_entity not in ['', 'unknown', 'unavailable', 'none'] }}
            then:
              - service: input_datetime.set_datetime
                target:
                  entity_id: "{{ fallback_tracker_entity }}"
                data:
                  datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

          - if:
              - condition: template
                value_template: "{{ notify_ha_enabled }}"
            then:
              - service: persistent_notification.create
                data:
                  title: "GießBot – {{ zone }}"
                  message: "{{ end_message }}"
                  notification_id: "{{ notification_id_base }}_end"

          - if:
              - condition: template
                value_template: "{{ notify_mobile_enabled and notify_entity not in ['', 'unknown', 'unavailable', 'none'] }}"
            then:
              - service: notify.notify
                continue_on_error: true
                target:
                  entity_id: "{{ notify_entity }}"
                data:
                  title: "GießBot – {{ zone }}"
                  message: "{{ end_message }}"

    default:
      - variables:
          status_message: >
            {% set valid = states(moisture_entity) not in ['unknown', 'unavailable', 'none', ''] %}
            {% if not valid and check_moisture %}
            {% if not fallback %}
            {{ skip_no_fallback_message }}
            {% elif fallback_tracker_entity in ['', 'unknown', 'unavailable', 'none'] %}
            {{ skip_no_tracker_message }}
            {% else %}
            {% set tracker = states(fallback_tracker_entity) %}
            {% set today = now().strftime('%Y-%m-%d') %}
            {% set last = tracker[:10] if tracker not in ['unknown', 'unavailable', 'none', ''] else '' %}
            {{ skip_fallback_used_message if last == today else skip_no_fallback_message }}
            {% endif %}
            {% else %}
            {{ skip_message }}
            {% endif %}

      - if:
          - condition: template
            value_template: "{{ notify_ha_enabled }}"
        then:
          - service: persistent_notification.create
            data:
              title: "GießBot – {{ zone }}"
              message: "{{ status_message }}"
              notification_id: "{{ notification_id_base }}_skip"

      - if:
          - condition: template
            value_template: "{{ notify_mobile_enabled and notify_entity not in ['', 'unknown', 'unavailable', 'none'] }}"
        then:
          - service: notify.notify
            continue_on_error: true
            target:
              entity_id: "{{ notify_entity }}"
            data:
              title: "GießBot – {{ zone }}"
              message: "{{ status_message }}"

mode: single

on_stop:
  - service: switch.turn_off
    target: !input watering_targets
