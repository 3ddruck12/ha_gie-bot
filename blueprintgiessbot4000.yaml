blueprint:
  name: GießBot 3000 – Greenhouse Smart Edition
  description: >
    Erweiterte Gewächshaus-Bewässerung für Tomaten & Gurken.
    Mit 2 täglichen Läufen, Sensor-Fallback, Temperatur- und Saisonanpassung
    sowie optionalen Push-Benachrichtigungen.
  domain: automation

  input:
    zone_name:
      name: Zonenname
      selector:
        text: {}
      default: Gewächshaus

    enable_switch:
      name: Aktivierungsschalter
      selector:
        entity:
          domain: input_boolean

    soil_moisture_sensor:
      name: Bodenfeuchtesensor
      selector:
        entity:
          domain: sensor

    temperature_sensor:
      name: Temperatursensor
      selector:
        entity:
          domain: sensor

    watering_targets:
      name: Ventile / Pumpen
      selector:
        target:
          entity:
            domain: switch

    morning_time:
      name: Morgens
      default: "05:00:00"
      selector:
        time: {}

    evening_time:
      name: Abends
      default: "20:30:00"
      selector:
        time: {}

    moisture_threshold:
      name: Feuchte-Schwelle (%)
      default: 45
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"

    base_duration:
      name: Basisdauer (Minuten)
      default: 20
      selector:
        number:
          min: 1
          max: 60
          unit_of_measurement: min

    temp_threshold:
      name: Temperatur-Schwelle (°C)
      default: 28
      selector:
        number:
          min: 0
          max: 50
          unit_of_measurement: °C

    temp_multiplier:
      name: Faktor bei Hitze
      default: 1.3
      selector:
        number:
          min: 1.0
          max: 2.0
          step: 0.1

    summer_multiplier:
      name: Sommer-Faktor
      default: 1.2
      selector:
        number:
          min: 1.0
          max: 2.0
          step: 0.1

    sensor_fallback:
      name: Sensor-Fallback aktivieren
      default: true
      selector:
        boolean: {}

    notify_enabled:
      name: Benachrichtigungen aktivieren
      default: true
      selector:
        boolean: {}

    notify_service:
      name: Benachrichtigungsdienst
      description: z. B. notify.mobile_app_mein_handy
      selector:
        entity:
          domain: notify

trigger:
  - platform: time
    at: !input morning_time
  - platform: time
    at: !input evening_time

condition:
  - condition: state
    entity_id: !input enable_switch
    state: "on"

action:
  - variables:
      zone: !input zone_name
      moisture_entity: !input soil_moisture_sensor
      temp_entity: !input temperature_sensor
      watering_target_data: !input watering_targets
      notify_enabled: !input notify_enabled
      notify_entity: !input notify_service

      soil_moisture: "{{ states(moisture_entity) | float(0) }}"
      temp: "{{ states(temp_entity) | float(0) }}"

      threshold: !input moisture_threshold
      base: !input base_duration

      temp_limit: !input temp_threshold
      temp_factor: !input temp_multiplier
      summer_factor: !input summer_multiplier

      fallback: !input sensor_fallback

      temp_adjust: "{{ temp_factor if temp > temp_limit else 1 }}"
      season_adjust: "{{ summer_factor if (now().month in [5, 6, 7, 8]) else 1 }}"
      final_duration: "{{ (base * temp_adjust * season_adjust) | round(0) }}"
      duration_seconds: "{{ (final_duration | int) * 60 }}"

      start_message: "{{ 'Gießen gestartet: ' ~ (final_duration | int | string) ~ ' Min. Feuchte: ' ~ (soil_moisture | string) ~ '%, Temp: ' ~ (temp | string) ~ '°C.' }}"
      end_message: "{{ 'Gießen beendet nach ' ~ (final_duration | int | string) ~ ' Min. Feuchte jetzt: ' ~ states(moisture_entity) ~ '%.' }}"
      skip_message: "{{ 'Kein Gießen nötig. Feuchte: ' ~ (soil_moisture | string) ~ '% (Schwelle: ' ~ (threshold | string) ~ '%).' }}"

  - choose:
      - conditions:
          - condition: template
            value_template: >
              {% set valid = states(moisture_entity) not in ['unknown', 'unavailable', 'none', ''] %}
              {{ (valid and soil_moisture < threshold) or (not valid and fallback) }}
        sequence:
          - service: switch.turn_on
            target: "{{ watering_target_data }}"

          - if:
              - condition: template
                value_template: "{{ notify_enabled and notify_entity not in ['', 'unknown', 'unavailable', 'none'] }}"
            then:
              - service: notify.notify
                continue_on_error: true
                target:
                  entity_id: "{{ notify_entity }}"
                data:
                  title: "GießBot – {{ zone }}"
                  message: "{{ start_message }}"

          - delay:
              seconds: "{{ duration_seconds }}"

          - service: switch.turn_off
            target: "{{ watering_target_data }}"

          - if:
              - condition: template
                value_template: "{{ notify_enabled and notify_entity not in ['', 'unknown', 'unavailable', 'none'] }}"
            then:
              - service: notify.notify
                continue_on_error: true
                target:
                  entity_id: "{{ notify_entity }}"
                data:
                  title: "GießBot – {{ zone }}"
                  message: "{{ end_message }}"

    default:
      - if:
          - condition: template
            value_template: "{{ notify_enabled and notify_entity not in ['', 'unknown', 'unavailable', 'none'] }}"
        then:
          - service: notify.notify
            continue_on_error: true
            target:
              entity_id: "{{ notify_entity }}"
            data:
              title: "GießBot – {{ zone }}"
              message: "{{ skip_message }}"

mode: single
