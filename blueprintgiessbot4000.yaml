blueprint:
  name: GießBot 3000 – Greenhouse Smart Edition
  description: >
    Erweiterte Gewächshaus-Bewässerung für Tomaten & Gurken.
    Mit 2 täglichen Läufen, Sensor-Fallback, Temperatur- und Saisonanpassung
    sowie optionalen Push-Benachrichtigungen.
  domain: automation

  input:
    zone_name:
      name: Zonenname
      selector:
        text: {}
      default: Gewächshaus

    enable_switch:
      name: Aktivierungsschalter
      selector:
        entity:
          domain: input_boolean

    soil_moisture_sensor:
      name: Bodenfeuchtesensor
      selector:
        entity:
          domain: sensor

    temperature_sensor:
      name: Temperatursensor
      selector:
        entity:
          domain: sensor

    watering_targets:
      name: Ventile / Pumpen
      selector:
        target:
          entity:
            domain: switch

    morning_time:
      name: Morgens
      default: "05:00:00"
      selector:
        time: {}

    evening_time:
      name: Abends
      default: "20:30:00"
      selector:
        time: {}

    moisture_threshold:
      name: Feuchte-Schwelle (%)
      default: 45
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"

    base_duration:
      name: Basisdauer (Minuten)
      default: 20
      selector:
        number:
          min: 1
          max: 60
          unit_of_measurement: min

    temp_threshold:
      name: Temperatur-Schwelle (°C)
      default: 28
      selector:
        number:
          min: 0
          max: 50
          unit_of_measurement: °C

    temp_multiplier:
      name: Faktor bei Hitze
      default: 1.3
      selector:
        number:
          min: 1.0
          max: 2.0
          step: 0.1

    summer_multiplier:
      name: Sommer-Faktor
      default: 1.2
      selector:
        number:
          min: 1.0
          max: 2.0
          step: 0.1

    sensor_fallback:
      name: Sensor-Fallback aktivieren
      default: true
      selector:
        boolean: {}

    notify_enabled:
      name: Benachrichtigungen aktivieren
      default: true
      selector:
        boolean: {}

    notify_service:
      name: Benachrichtigungsdienst
      description: z. B. notify.mobile_app_mein_handy
      selector:
        entity:
          domain: notify

trigger:
  - platform: time
    at: !input morning_time
  - platform: time
    at: !input evening_time

condition:
  - condition: state
    entity_id: !input enable_switch
    state: "on"

action:
  - variables:
      zone: !input zone_name
      moisture_entity: !input soil_moisture_sensor
      temp_entity: !input temperature_sensor
      notify_enabled: !input notify_enabled

      moisture: "{{ states(moisture_entity) }}"
      moisture_value: "{{ states(moisture_entity) | float(999) }}"
      temp: "{{ states(temp_entity) | float(0) }}"

      threshold: !input moisture_threshold
      base: !input base_duration

      temp_limit: !input temp_threshold
      temp_factor: !input temp_multiplier
      summer_factor: !input summer_multiplier

      fallback: !input sensor_fallback

      month: "{{ now().month }}"

      is_summer: "{{ month in [5,6,7,8] }}"

      moisture_valid: "{{ moisture not in ['unknown','unavailable','none'] }}"

      needs_watering: >
        {{
          (moisture_valid and moisture_value < threshold)
          or (not moisture_valid and fallback)
        }}

      temp_adjust: >
        {{ temp_factor if temp > temp_limit else 1 }}

      season_adjust: >
        {{ summer_factor if is_summer else 1 }}

      final_duration: >
        {{ (base * temp_adjust * season_adjust) | round(0) }}

      start_message: >
        {{ 'Gießen gestartet (Fallback): ' ~ (final_duration | int | string) ~ ' Min. Sensor unbekannt.'
           if not moisture_valid
           else 'Gießen gestartet: ' ~ (final_duration | int | string) ~ ' Min. Feuchte: ' ~ (moisture_value | string) ~ '%, Temp: ' ~ (temp | string) ~ '°C.' }}

      end_message: >
        {{ 'Gießen beendet nach ' ~ (final_duration | int | string) ~ ' Min. Feuchte jetzt: ' ~ states(moisture_entity) ~ '%.' }}

      skip_message: >
        {{ 'Kein Gießen: Sensor unbekannt (Fallback deaktiviert).'
           if (not moisture_valid and not fallback)
           else 'Kein Gießen nötig. Feuchte: ' ~ (moisture_value | string) ~ '% (Schwelle: ' ~ (threshold | string) ~ '%).' }}

  - if:
      - condition: template
        value_template: "{{ needs_watering }}"
    then:
      - if:
          - condition: template
            value_template: "{{ notify_enabled }}"
        then:
          - service: notify.notify
            target:
              entity_id: !input notify_service
            data:
              title: "GießBot – {{ zone }}"
              message: "{{ start_message | trim }}"

      - service: switch.turn_on
        target: !input watering_targets

      - delay:
          minutes: "{{ final_duration | int }}"

      - service: switch.turn_off
        target: !input watering_targets

      - if:
          - condition: template
            value_template: "{{ notify_enabled }}"
        then:
          - service: notify.notify
            target:
              entity_id: !input notify_service
            data:
              title: "GießBot – {{ zone }}"
              message: "{{ end_message | trim }}"

    else:
      - if:
          - condition: template
            value_template: "{{ notify_enabled }}"
        then:
          - service: notify.notify
            target:
              entity_id: !input notify_service
            data:
              title: "GießBot – {{ zone }}"
              message: "{{ skip_message | trim }}"

mode: parallel
